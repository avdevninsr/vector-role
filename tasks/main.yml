---
- name: Download Vector DEB
  ansible.builtin.get_url:
    url: "{{ vector_deb_url }}"
    dest: "{{ vector_deb_path }}"
    mode: '0777'

- name: Install Vector
  become: true
  ansible.builtin.apt:
    deb: "{{ vector_deb_path }}"
  notify: Restart vector

- name: Deploy Vector config
  become: true
  ansible.builtin.template:
    src: vector.j2
    dest: "{{ vector_config_path }}"
    mode: '0777'
  notify: Restart vector

- name: Start and enable Vector
  become: true
  ansible.builtin.service:
    name: vector
    state: started
    enabled: true

